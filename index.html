<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path d=%22M50 2.5 L95.5 26.25 V73.75 L50 97.5 L4.5 73.75 V26.25 Z%22 fill=%22%23ec028b%22/></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RHIVE - Instant Estimator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'rhive-pink': '#ec028b',
            'rhive-gold': '#e2ab49',
            'rhive-blue': '#08137C',
          },
          fontFamily: {
            sans: ['Rubik', 'sans-serif'],
            serif: ['"EB Garamond"', 'serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          boxShadow: {
            'pink-glow': '0 0 15px rgba(236, 2, 139, 0.4)',
            'pink-glow-sm': '0 0 8px rgba(236, 2, 139, 0.3)',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0, transform: 'translateY(10px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
          },
          animation: {
            'fade-in': 'fadeIn 0.7s ease-out forwards',
          },
        },
      },
    }
  </script>
  <style>
    .pac-container {
      z-index: 10000 !important;
      background-color: #0a0a0a;
      border: 1px solid #374151;
      font-family: 'Rubik', sans-serif;
      border-radius: 0;
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.8);
    }

    .pac-item {
      color: #e5e7eb;
      border-top: 1px solid #1f2937;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 14px;
    }

    .pac-item:hover {
      background-color: #1f2937;
    }

    .pac-item-query {
      color: #ffffff;
      font-weight: 600;
    }

    .pac-icon {
      filter: invert(1) hue-rotate(300deg) saturate(5);
      /* Colorize toward pink */
    }

    /* Hide scrollbars but keep functionality */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Custom Scrollbar Styling (Theme-aware) */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--scrollbar-track, #000000);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb, #333333);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ec028b;
      /* Rhive Pink on hover */
    }
  </style>
  <script>
    window.googleMapsApiLoaded = false;
    function onGoogleMapsApiReady() {
      window.googleMapsApiLoaded = true;
      window.dispatchEvent(new Event('google-maps-api-ready'));
    }
  </script>
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAyDim_1uOJy6rS_GZ-EwNKmJyCrvSvqRA&libraries=places,drawing,geometry&callback=onGoogleMapsApiReady"></script>
  <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.1.1/",
        "react": "https://aistudiocdn.com/react@^19.1.1",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
        "class-variance-authority": "https://aistudiocdn.com/class-variance-authority@^0.7.1",
        "@radix-ui/react-slot": "https://aistudiocdn.com/@radix-ui/react-slot@^1.2.3",
        "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
        "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.3.1",
        "@radix-ui/react-accordion": "https://aistudiocdn.com/@radix-ui/react-accordion@^1.2.12",
        "path": "https://aistudiocdn.com/path@^0.12.7",
        "vite": "https://aistudiocdn.com/vite@^7.2.4",
        "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
        "url": "https://aistudiocdn.com/url@^0.11.4",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="text-gray-200 overflow-hidden selection:bg-rhive-pink/30 selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
